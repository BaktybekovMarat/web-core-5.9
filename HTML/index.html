<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/CSS/style.css" />
    <meta charset="UTF-8" />
    <title>Get iintoo it today</title>
  </head>
  <body>
    <div class="main-wrapper">
      <div class="container">
        <img class="logo" src="/css-task/img/logo.svg" alt="" />
      </div>
      <div class="lef-side">
        <div class="texts">
          <h1 style="color: #7b8a92" class="title">Get iinto it today</h1>
          <h2 style="color: #2a4a5c" class="text">
            There is no charge or obligation upon registration.
          </h2>
        </div>
        <div class="social-container">
          <button class="fb-button">Register with Facebook</button>
          <button class="ln-button">Register with LinkedIn</button>
        </div>
        <div class="separator">
          <span> OR </span>
        </div>
        <div class="input-container">
          <div class="field-group">
            <label for="">Email</label>
            <input class="email"
              type="email"
              name="email"
              id="email"
              placeholder="gus.goodwin@gmail.com"
              required
            />
          </div>
          <div class="field-group">
            <label for="">Phone</label>
            <input type="tel" name="tel" id="tel" required />
          </div>
        </div>
        <div class="investor-selection">
          <h3>What type of investor are you?</h3>
          <p>Select the type of investor you are below.</p>
        </div>
        <div>
          <form class="radio-group">
            <input type="radio" checked/>
            <label>Individual</label>
            <img
              class="info-icon"
              src="/css-task/img/circle-info-solid-full.svg"
              alt=""
            />
            <input type="radio" value="none" />
            <label>Business<span></span></label>
            <img
              class="info-icon"
              src="/css-task/img/circle-info-solid-full.svg"
              alt=""
            />
            <input type="radio"/>
            <label>IRA<span></span></label>
            <img
              class="info-icon"
              src="/css-task/img/circle-info-solid-full.svg"
              alt=""
            />
            <input type="radio" />
            <label>Trust<span></span></label>
            <img
              class="info-icon"
              src="/css-task/img/circle-info-solid-full.svg"
              alt=""
            />
          </form>
        </div>
        <div class="info-box">
          "i am a natural person investing on my own behalf as a sole owner,
          joint tenant, or tenant in common"
        </div>
        <div class="check-box">
          <label
            >I agree to the terms and receiving notifications from iintoo
            <span>
              <a href="#">View full terms</a>
            </span>
          </label>
          <input class="checkbox-btn" type="checkbox" />
        </div>
        <form action="">
          <input class="create-acc" type="button" value="Creat account" />
        </form>
      </div>
    </div>
  </body>
</html>
