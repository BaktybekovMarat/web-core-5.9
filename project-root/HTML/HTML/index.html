<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/project-root/HTML/CSS/style.css" />
    <meta charset="UTF-8" />
    <title>Get iintoo it today</title>
  </head>
  <body>
    <div class="main-wrapper">
      <div class="container">
        <img class="logo" src="/css-task'/img/logo.svg" alt="logo of company" />
      </div>
      <div class="lef-side">
        <div class="texts">
          <h1 style="color: #7b8a92" class="title">Get iintoo it today</h1>
          <h2 style="color: #2a4a5c" class="text">
            There is no charge or obligation upon registration.
          </h2>
        </div>
        <div class="social-container">
          <button class="fb-button">Register with Facebook</button>
          <button class="ln-button">Register with LinkedIn</button>
        </div>
        <div class="separator">
          <span> OR </span>
        </div>
        <div class="input-container">
          <div class="field-group">
            <label for="">Email</label>
            <input class="email"
              type="email"
              name="email"
              id="email"
              placeholder="gus.goodwin@gmail.com"
              required
            />
          </div>
          <div class="field-group">
            <label >Phone</label>
            <input type="tel" name="tel" id="tel" required />
          </div>
        </div>
        <div class="investor-selection">
          <h3>What type of investor are you?</h3>
          <p>Select the type of investor you are below.</p>
        </div>
        <div>
      <form class="radio-group">
        <input type="radio" name="type-of-investor" id="Individual" value="Individual" checked/>
        <label for="Individual">Individual</label>
        <img
          class="info-icon"
          src="/css-task'/img/circle-info-solid-full.svg"  title="Here need to show information"
          alt="info icon"
        />
        <input type="radio" name="type-of-investor" id="Business" value="Business" />
        <label for="Business">Business</label>
        <img
          class="info-icon"
          src="/css-task'/img/circle-info-solid-full.svg" title="Here need to show information"
          alt="info icon"
        />
        <input type="radio" name="type-of-investor"  id="IRA" value="IRA"/>
        <label for="IRA">IRA</label>
        <img
          class="info-icon"
          src="/css-task'/img/circle-info-solid-full.svg" title="Here need to show information"
          alt="info icon"
        />
        <input type="radio" name="type-of-investor" id="Trust" value="Trust" />
        <label for="Trust">Trust</label>
        <img
          class="info-icon"
          src="/css-task'/img/circle-info-solid-full.svg" title="Here need to show information"
          alt="info icon"
        />
      </form>
    </div>
        <div class="info-box">
          "i am a natural person investing on my own behalf as a sole owner,
          joint tenant, or tenant in common"
        </div>
        <div class="check-box">
          <label
            >I agree to the terms and receiving notifications from iintoo
            <span>
              <a href="#">View full terms</a>
            </span>
          </label>
          <input class="checkbox-btn" type="checkbox" />
        </div>
        <form>
          <input class="create-acc" type="button" value="Create account" />
        </form>
      </div>
    </div>
  </body>
</html>
